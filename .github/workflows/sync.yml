name: Sync upstream

on:
  schedule:
    # Check daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

# GITHUB_TOKEN 默认限权（cron / workflow_dispatch 触发）；
# actions: write 才能 dispatch build.yml。
permissions:
  actions: write
  contents: read

env:
  # cutoff = 我们最新 release（v147.1.0）upstream published_at 的刚过这一刻。
  # upstream 在这之后发的任何 release（新 major / minor / 老 major 的 patch）
  # 我们都会触发 build。之前的版本我们有意跳过 / 部分追齐，不再追溯。
  #
  # 升级规则：发了新一批 build 后若想把 cutoff 前推，改这里的值——老的
  # 版本就不会再被 sync 重复触发了。
  CUTOFF: "2026-04-11T00:00:00Z"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find upstream versions to build
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 上游按 cutoff 过滤 + 本地去重
          NEW=$(gh api repos/denoland/rusty_v8/releases --paginate \
            --jq ".[] | select(.published_at > \"$CUTOFF\") | .tag_name" \
            | sed 's/^v//')

          OURS=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].tag_name' | sed 's/^v//')

          TRIGGER=""
          for ver in $NEW; do
            if ! echo "$OURS" | grep -qx "$ver"; then
              TRIGGER="$TRIGGER $ver"
            fi
          done
          TRIGGER=$(echo "$TRIGGER" | xargs)

          echo "new=$TRIGGER" >> "$GITHUB_OUTPUT"
          if [ -n "$TRIGGER" ]; then
            echo "To trigger (cutoff $CUTOFF): $TRIGGER"
          else
            echo "All up to date (cutoff $CUTOFF)"
          fi

      - name: Trigger builds for new versions
        if: steps.check.outputs.new != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for ver in ${{ steps.check.outputs.new }}; do
            echo "Triggering build for v$ver..."
            gh workflow run build.yml -f v8_version="$ver"
            sleep 5
          done
