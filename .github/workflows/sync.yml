name: Sync upstream

on:
  schedule:
    # Check daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

# GITHUB_TOKEN 默认限权（cron / workflow_dispatch 触发）；
# actions: write 才能 dispatch build.yml。
permissions:
  actions: write
  contents: read

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find oldest missing upstream version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 拉 denoland/rusty_v8 最近 20 个 release
          UPSTREAM=$(gh api repos/denoland/rusty_v8/releases --jq '.[0:20] | .[].tag_name' | sed 's/^v//')

          # 本 repo 已 release 的版本
          OURS=$(gh api repos/${{ github.repository }}/releases --jq '.[].tag_name' | sed 's/^v//')

          # 挑最老的一个 missing（按升序拿第一个）——每天 cron 触发一次，
          # 一次一个版本避免 macOS runner 排队。追上 20 个版本要 20 天，
          # 但 V8 正常每 ~6 周发一版，日追追得上。
          # 用户需要快速补齐历史时手工 workflow_dispatch build.yml。
          MISSING=""
          for ver in $(echo "$UPSTREAM" | sort -V); do
            if ! echo "$OURS" | grep -qx "$ver"; then
              MISSING="$ver"
              break
            fi
          done

          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
          if [ -n "$MISSING" ]; then
            echo "Oldest missing: v$MISSING"
          else
            echo "All up to date"
          fi

      - name: Trigger build for that version
        if: steps.check.outputs.missing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${{ steps.check.outputs.missing }}"
          echo "Triggering build for v$ver..."
          gh workflow run build.yml -f v8_version="$ver"
