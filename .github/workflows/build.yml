name: Build

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "rusty_v8 crate version (e.g. 130.0.7)"
        required: true
        default: "130.0.7"

jobs:
  build:
    strategy:
      # If one target fails, cancel the rest — you’ll rerun anyway, saves time
      fail-fast: true
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
            lib_suffix: aarch64-linux-android
          - target: x86_64-linux-android
            os: ubuntu-latest
            lib_suffix: x86_64-linux-android

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # v140+ cold builds can approach 120 minutes, leave headroom
    timeout-minutes: 150

    # actions: write is needed to prune old v8-deps cache
    permissions:
      actions: write
      contents: read

    env:
      # Centralize all external versions that affect build artifacts.
      # Changing these will invalidate cache keys.
      NDK_VERSION: r29
      ANDROID_API_LEVEL: "24"

    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libclang-dev
          # Chromium v142+ libc++ requires Clang 19+ (uses newer builtins like __builtin_clzg)
          # Install LLVM 19 for top-level bindgen. V8 internal build still uses its own clang.
          curl -sSf https://apt.llvm.org/llvm.sh | sudo bash -s 19
          sudo apt-get install -y libclang-19-dev

      - name: Download GN
        run: |
          curl -sL -o /tmp/gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest"
          mkdir -p /tmp/gn && cd /tmp/gn && unzip -o /tmp/gn.zip && chmod +x gn
          echo "GN=/tmp/gn/gn" >> "$GITHUB_ENV"

      # Cache rusty_v8 source (shared across targets by V8 version)
      # Note: actions/cache exclusion patterns with '!' are unreliable for directories.
      # Instead, remove OS-specific rust-toolchain manually after restore.
      - uses: actions/cache/restore@v5
        id: src-cache
        with:
          path: rusty_v8-src
          key: rusty-v8-src-v${{ inputs.v8_version }}

      # Use actions/checkout instead of cargo git to handle submodules more reliably
      # clean: false keeps untracked files generated by build.rs
      - name: Checkout rusty_v8 source
        if: steps.src-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          repository: denoland/rusty_v8
          ref: v${{ inputs.v8_version }}
          submodules: recursive
          path: rusty_v8-src
          clean: false

      # rust-toolchain is OS-specific binary, cannot be shared across runners
      # Force deletion so build.rs downloads correct one
      - name: Purge OS-specific rust-toolchain
        run: rm -rf rusty_v8-src/third_party/rust-toolchain

      - name: Create build crate
        run: |
          # Wrapper crate referencing local rusty_v8 source
          mkdir -p v8-build/src
          echo "fn main() {}" > v8-build/src/main.rs
          cat > v8-build/Cargo.toml << 'EOF'
          [package]
          name = "v8-build"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          v8 = { path = "../rusty_v8-src" }
          EOF

          # Seed Cargo.lock to avoid incompatible dependency resolution
          if [ -f rusty_v8-src/Cargo.lock ]; then
            cp rusty_v8-src/Cargo.lock v8-build/Cargo.lock
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: v8-build
          key: ${{ matrix.target }}-${{ inputs.v8_version }}

      # Cache Android NDK (reused across V8 versions)
      - uses: actions/cache/restore@v5
        id: ndk-cache
        with:
          path: /tmp/android-ndk-${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      # Cache V8 build artifacts (large: gn_out + clang)
      - uses: actions/cache/restore@v5
        id: v8-cache
        with:
          path: |
            v8-build/target/${{ matrix.target }}/release/gn_out
            v8-build/target/${{ matrix.target }}/release/clang
          key: v8-deps-${{ matrix.target }}-v${{ inputs.v8_version }}-api${{ env.ANDROID_API_LEVEL }}

      - name: Prepare Android NDK
        run: |
          V8_SRC="$GITHUB_WORKSPACE/rusty_v8-src"
          echo "V8_SRC=$V8_SRC" >> "$GITHUB_ENV"

          # Store NDK in dedicated cache path
          NDK_CACHE_DIR="/tmp/android-ndk-${NDK_VERSION}"
          if [ ! -d "$NDK_CACHE_DIR" ]; then
            curl -L -o /tmp/ndk.zip "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
            unzip -q -d /tmp /tmp/ndk.zip
            mv "/tmp/android-ndk-${NDK_VERSION}" "$NDK_CACHE_DIR" 2>/dev/null || true
            rm /tmp/ndk.zip
          fi

          # Symlink into V8 expected layout
          NDK_DIR="$V8_SRC/third_party/android_ndk"
          ln -sfn "$NDK_CACHE_DIR" "$NDK_DIR"

          mkdir -p "$V8_SRC/third_party/android_toolchain"
          ln -sfn "$NDK_DIR" "$V8_SRC/third_party/android_toolchain/ndk"

          # Some V8 versions require sysroot bootstrap
          SYSROOT_SCRIPT="$V8_SRC/build/linux/sysroot_scripts/install-sysroot.py"
          if [ -f "$SYSROOT_SCRIPT" ] && [ ! -d "$V8_SRC/build/linux/debian_bullseye_amd64-sysroot" ]; then
            python3 "$SYSROOT_SCRIPT" --arch=amd64
          fi

          # Configure linker
          LINKER="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
          if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
            LINKER="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${ANDROID_API_LEVEL}-clang"
          fi

          mkdir -p v8-build/.cargo
          cat > v8-build/.cargo/config.toml << TOML
          [target.${{ matrix.target }}]
          linker = "$LINKER"
          rustflags = ["-C", "link-args=-Wl,--allow-multiple-definition"]
          TOML

      - name: Build V8 from source
        env:
          V8_FROM_SOURCE: "1"
          NINJA: /usr/bin/ninja
        run: |
          cd v8-build
          cargo build --target ${{ matrix.target }} --release

      # Save NDK cache
      - uses: actions/cache/save@v5
        if: always() && steps.ndk-cache.outputs.cache-hit != 'true'
        with:
          path: /tmp/android-ndk-${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      # Remove OS-specific toolchain before saving source cache
      - name: Remove rust-toolchain before save
        if: always() && steps.src-cache.outputs.cache-hit != 'true'
        run: rm -rf rusty_v8-src/third_party/rust-toolchain

      - uses: actions/cache/save@v5
        if: always() && steps.src-cache.outputs.cache-hit != 'true'
        with:
          path: rusty_v8-src
          key: rusty-v8-src-v${{ inputs.v8_version }}

      # Force refresh V8 cache by deleting existing key
      - name: Delete stale v8-deps cache
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEY: v8-deps-${{ matrix.target }}-v${{ inputs.v8_version }}-api${{ env.ANDROID_API_LEVEL }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/actions/caches?key=$KEY" 2>/dev/null || true

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            v8-build/target/${{ matrix.target }}/release/gn_out
            v8-build/target/${{ matrix.target }}/release/clang
          key: v8-deps-${{ matrix.target }}-v${{ inputs.v8_version }}-api${{ env.ANDROID_API_LEVEL }}

      - name: Extract artifacts
        run: |
          TARGET=${{ matrix.target }}
          SUFFIX=${{ matrix.lib_suffix }}
          BUILD_DIR="v8-build/target/$TARGET/release"

          LIB=$(find "$BUILD_DIR" -name "librusty_v8.a" | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::librusty_v8.a not found"
            exit 1
          fi

          OUTNAME="librusty_v8_release_${SUFFIX}.a"
          cp "$LIB" "$OUTNAME"
          gzip -f "$OUTNAME"

          BINDING=$(find "$BUILD_DIR" -name "src_binding.rs" | head -1)
          if [ -z "$BINDING" ]; then
            echo "::error::src_binding.rs not found"
            exit 1
          fi

          cp "$BINDING" "src_binding_release_${SUFFIX}.rs"

      - uses: actions/upload-artifact@v6
        with:
          name: librusty_v8-${{ matrix.lib_suffix }}
          path: |
            *.a.gz
            *.rs

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.v8_version }}
          name: "rusty_v8 v${{ inputs.v8_version }}"
          body: |
            Prebuilt `librusty_v8.a` for Android (API 24).

            Usage:
            ```bash
            RUSTY_V8_ARCHIVE=/path/to/librusty_v8_release_<target>.a cargo build --target <target>
            ```
          files: |
            *.a.gz
            *.rs
